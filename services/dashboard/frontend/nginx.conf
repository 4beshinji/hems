server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/wallet/ {
        resolver 127.0.0.11 valid=30s;
        set $wallet_upstream http://wallet:8000;
        rewrite ^/api/wallet/(.*) /$1 break;
        proxy_pass $wallet_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/voice/ {
        resolver 127.0.0.11 valid=30s;
        set $voice_upstream http://voice-service:8000;
        proxy_pass $voice_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /audio/ {
        resolver 127.0.0.11 valid=30s;
        set $voice_audio_upstream http://voice-service:8000;
        proxy_pass $voice_audio_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
