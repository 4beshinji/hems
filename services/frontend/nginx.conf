server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy — use variables for lazy DNS resolution so nginx starts
    # even if upstream containers are not yet running.
    location /api/voice/ {
        resolver 127.0.0.11 valid=30s;
        set $voice_upstream http://voice-service:8000;
        proxy_pass $voice_upstream/api/voice/;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer ${HEMS_API_KEY}";
    }

    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer ${HEMS_API_KEY}";
    }

    location /audio/ {
        resolver 127.0.0.11 valid=30s;
        set $voice_audio_upstream http://voice-service:8000;
        proxy_pass $voice_audio_upstream/audio/;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
