services:
  # --- Central Bus ---
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hems-mqtt
    restart: always
    ports:
      - "${MQTT_BIND_ADDR:-127.0.0.1}:${HEMS_PORT_MQTT:-1893}:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./mosquitto/aclfile:/mosquitto/config/aclfile:ro
      - hems_mqtt_data:/mosquitto/data
      - hems_mqtt_log:/mosquitto/log
    networks:
      - hems-net
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -u ${MQTT_USER_BRAIN:-hems-brain} -P ${MQTT_PASS_BRAIN} -t '$$SYS/broker/version' -C 1 -W 5 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # --- Brain (LLM + Rule-based dual mode) ---
  brain:
    build: ../services/brain
    container_name: hems-brain
    restart: always
    depends_on:
      mosquitto:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_USER=${MQTT_USER_BRAIN:-hems-brain}
      - MQTT_PASS=${MQTT_PASS_BRAIN:?MQTT_PASS_BRAIN is required}
      - HEMS_API_KEY=${HEMS_API_KEY:?HEMS_API_KEY is required}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LLM_API_URL=${LLM_API_URL:-http://ollama:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:7b}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - BACKEND_URL=http://backend:8000
      - VOICE_SERVICE_URL=http://voice-service:8000
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/hems.db}
      - GPU_TYPE=${GPU_TYPE:-none}
      - GPU_HIGH_LOAD_THRESHOLD=${GPU_HIGH_LOAD_THRESHOLD:-80}
      - CHARACTER=${CHARACTER:-}
      - CHARACTER_FILE=${CHARACTER_FILE:-}
      - TZ=${TZ:-Asia/Tokyo}
      - ROOMS=${ROOMS:-living_room}
      - LOCALCRAW_BRIDGE_URL=${LOCALCRAW_BRIDGE_URL:-}
      - OBSIDIAN_BRIDGE_URL=${OBSIDIAN_BRIDGE_URL:-}
      - GAS_BRIDGE_URL=${GAS_BRIDGE_URL:-}
      - HA_BRIDGE_URL=${HA_BRIDGE_URL:-}
      - BIOMETRIC_BRIDGE_URL=${BIOMETRIC_BRIDGE_URL:-}
      - PERCEPTION_BRIDGE_URL=${PERCEPTION_BRIDGE_URL:-}
    volumes:
      - ../services/brain/src:/app
      - ../config:/config:ro
      - hems_brain_data:/app/data
    networks:
      - hems-net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('mosquitto',1883),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Backend (API + Points + DataMart) ---
  backend:
    build: ../services/backend
    container_name: hems-backend
    restart: always
    ports:
      - "${HEMS_PORT_BACKEND:-8010}:8000"
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/hems.db}
      - MQTT_BROKER=mosquitto
      - MQTT_USER=${MQTT_USER_BACKEND:-hems-backend}
      - MQTT_PASS=${MQTT_PASS_BACKEND:?MQTT_PASS_BACKEND is required}
      - HEMS_API_KEY=${HEMS_API_KEY:?HEMS_API_KEY is required}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      - TZ=${TZ:-Asia/Tokyo}
      - HA_BRIDGE_URL=${HA_BRIDGE_URL:-}
    volumes:
      - ../services/backend:/app
      - hems_backend_data:/app/data
    networks:
      - hems-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Frontend (React SPA + nginx) ---
  frontend:
    build: ../services/frontend
    container_name: hems-frontend
    restart: always
    ports:
      - "${HEMS_PORT_FRONTEND:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hems-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Voice Service (Plugin-based TTS) ---
  voice-service:
    build: ../services/voice
    container_name: hems-voice
    restart: always
    ports:
      - "${HEMS_PORT_VOICE:-8012}:8000"
    depends_on:
      mosquitto:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TTS_PROVIDER=${TTS_PROVIDER:-espeak}
      - VOICEVOX_URL=${VOICEVOX_URL:-http://voicevox:50021}
      - VOISONA_URL=${VOISONA_URL:-}
      - VOISONA_USERNAME=${VOISONA_USERNAME:-}
      - VOISONA_PASSWORD=${VOISONA_PASSWORD:-}
      - STYLE_BERT_VITS2_URL=${STYLE_BERT_VITS2_URL:-}
      - LLM_API_URL=${LLM_API_URL:-http://ollama:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:7b}
      - CHARACTER=${CHARACTER:-}
      - CHARACTER_FILE=${CHARACTER_FILE:-}
      - TZ=${TZ:-Asia/Tokyo}
    volumes:
      - ../services/voice/src:/app
      - ../config:/config:ro
      - hems_audio_data:/app/audio
      - ${VOISONA_SHARED_DIR:-/tmp/hems-tts}:/tmp/hems-tts
    networks:
      - hems-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Mock LLM (Development, profile: mock) ---
  mock-llm:
    build: ./mock_llm
    container_name: hems-mock-llm
    restart: unless-stopped
    profiles: ["mock"]
    ports:
      - "${HEMS_PORT_MOCK_LLM:-8011}:8000"
    networks:
      - hems-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ========== Optional Services (profiles) ==========

  # --- localcraw Bridge (PC metrics + service monitor, OpenClaw不要) ---
  localcraw-bridge:
    build:
      context: ../../localcraw
      dockerfile: Dockerfile
    container_name: hems-localcraw-bridge
    restart: always
    profiles: ["localcraw"]
    # pid:host でホストのPID名前空間を共有。
    # /proc はpid:host時にコンテナ内で自動的にホストのものが見えるため明示的なマウント不要。
    # (/proc:ro マウントは AppArmor + healthcheck exec と競合するため使用しない)
    pid: "host"
    ports:
      - "${HEMS_PORT_OPENCLAW_BRIDGE:-8013}:8000"
    depends_on:
      mosquitto:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=8000
      - TZ=${TZ:-Asia/Tokyo}
      - MQTT_BROKER=mosquitto
      - MQTT_USER=${MQTT_USER_LOCALCRAW:-hems-localcraw}
      - MQTT_PASS=${MQTT_PASS_LOCALCRAW:?MQTT_PASS_LOCALCRAW is required}
      - OPENCLAW_METRICS_INTERVAL=${OPENCLAW_METRICS_INTERVAL:-10}
      - OPENCLAW_PROCESS_INTERVAL=${OPENCLAW_PROCESS_INTERVAL:-30}
      - HEMS_GMAIL_ENABLED=${HEMS_GMAIL_ENABLED:-false}
      - HEMS_GMAIL_EMAIL=${HEMS_GMAIL_EMAIL:-}
      - HEMS_GMAIL_APP_PASSWORD=${HEMS_GMAIL_APP_PASSWORD:-}
      - HEMS_GMAIL_INTERVAL=${HEMS_GMAIL_INTERVAL:-300}
      - HEMS_GITHUB_ENABLED=${HEMS_GITHUB_ENABLED:-false}
      - HEMS_GITHUB_TOKEN=${HEMS_GITHUB_TOKEN:-}
      - HEMS_GITHUB_INTERVAL=${HEMS_GITHUB_INTERVAL:-300}
      - HEMS_BROWSER_CHECKERS=${HEMS_BROWSER_CHECKERS:-[]}
      - HEMS_HA_URL=${HEMS_HA_URL:-}
      - HEMS_HA_TOKEN=${HEMS_HA_TOKEN:-}
    networks:
      - hems-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Obsidian Bridge (Knowledge store integration) ---
  obsidian-bridge:
    build: ../services/obsidian-bridge
    container_name: hems-obsidian-bridge
    restart: always
    profiles: ["obsidian"]
    ports:
      - "${HEMS_PORT_OBSIDIAN_BRIDGE:-8014}:8000"
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - OBSIDIAN_VAULT_PATH=/vault
      - OBSIDIAN_WATCHER_DEBOUNCE=${OBSIDIAN_WATCHER_DEBOUNCE:-2.0}
      - MQTT_BROKER=mosquitto
      - MQTT_USER=${MQTT_USER_OBSIDIAN:-hems-obsidian}
      - MQTT_PASS=${MQTT_PASS_OBSIDIAN:?MQTT_PASS_OBSIDIAN is required}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Asia/Tokyo}
    volumes:
      - ../services/obsidian-bridge/src:/app
      - ${OBSIDIAN_VAULT_PATH:-/tmp/hems-vault}:/vault
    networks:
      - hems-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- GAS Bridge (Google Apps Script integration) ---
  gas-bridge:
    build: ../services/gas-bridge
    container_name: hems-gas-bridge
    restart: always
    profiles: ["gas"]
    ports:
      - "${HEMS_PORT_GAS_BRIDGE:-8015}:8000"
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - GAS_WEBAPP_URL=${GAS_WEBAPP_URL:-}
      - GAS_API_KEY=${GAS_API_KEY:-}
      - HEMS_GAS_CALENDAR_INTERVAL=${HEMS_GAS_CALENDAR_INTERVAL:-120}
      - HEMS_GAS_TASKS_INTERVAL=${HEMS_GAS_TASKS_INTERVAL:-300}
      - HEMS_GAS_GMAIL_INTERVAL=${HEMS_GAS_GMAIL_INTERVAL:-300}
      - HEMS_GAS_SHEETS_INTERVAL=${HEMS_GAS_SHEETS_INTERVAL:-600}
      - HEMS_GAS_DRIVE_INTERVAL=${HEMS_GAS_DRIVE_INTERVAL:-600}
      - HEMS_GAS_SHEETS=${HEMS_GAS_SHEETS:-}
      - MQTT_BROKER=mosquitto
      - MQTT_USER=${MQTT_USER_GAS:-hems-gas}
      - MQTT_PASS=${MQTT_PASS_GAS:?MQTT_PASS_GAS is required}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Asia/Tokyo}
    volumes:
      - ../services/gas-bridge/src:/app
    networks:
      - hems-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- Home Assistant (Smart home hub) ---
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: hems-homeassistant
    profiles: ["ha"]
    volumes:
      - ${HEMS_HA_CONFIG_PATH:-./ha-config}:/config
    network_mode: host
    restart: unless-stopped

  # --- HA Bridge (Home Assistant integration) ---
  ha-bridge:
    build: ../services/ha-bridge
    container_name: hems-ha-bridge
    restart: always
    profiles: ["ha"]
    ports:
      - "${HEMS_PORT_HA_BRIDGE:-8016}:8000"
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - HA_URL=${HA_URL:-http://host.docker.internal:8123}
      - HA_TOKEN=${HA_TOKEN:-}
      - HEMS_HA_ENTITY_MAP=${HEMS_HA_ENTITY_MAP:-{}}
      - HEMS_HA_POLL_INTERVAL=${HEMS_HA_POLL_INTERVAL:-30}
      - MQTT_BROKER=mosquitto
      - MQTT_USER=${MQTT_USER_HA:-hems-ha-bridge}
      - MQTT_PASS=${MQTT_PASS_HA:?MQTT_PASS_HA is required}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Asia/Tokyo}
    volumes:
      - ../services/ha-bridge/src:/app
    networks:
      - hems-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- Biometric Bridge (Smartband / Gadgetbridge integration) ---
  biometric-bridge:
    build: ../services/biometric-bridge
    container_name: hems-biometric-bridge
    restart: always
    profiles: ["biometric"]
    ports:
      - "${HEMS_PORT_BIOMETRIC_BRIDGE:-8017}:8000"
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_USER=${MQTT_USER_BIOMETRIC:-hems-biometric}
      - MQTT_PASS=${MQTT_PASS_BIOMETRIC:?MQTT_PASS_BIOMETRIC is required}
      - BIOMETRIC_WEBHOOK_SECRET=${BIOMETRIC_WEBHOOK_SECRET:?BIOMETRIC_WEBHOOK_SECRET is required}
      - BIOMETRIC_PROVIDER=${BIOMETRIC_PROVIDER:-gadgetbridge}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Asia/Tokyo}
    volumes:
      - ../services/biometric-bridge/src:/app
    networks:
      - hems-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- VOICEVOX Engine ---
  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    container_name: hems-voicevox
    restart: always
    profiles: ["voicevox"]
    ports:
      - "${HEMS_PORT_VOICEVOX:-50031}:50021"
    networks:
      - hems-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/50021' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # --- Ollama (Local LLM) ---
  # GPU-agnostic base. Run `python infra/scripts/gpu_setup.py` to generate
  # docker-compose.gpu.yml with NVIDIA/AMD-specific settings, then start with:
  #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml --profile ollama up -d
  ollama:
    image: ollama/ollama
    container_name: hems-ollama
    restart: always
    profiles: ["ollama"]
    ports:
      - "${HEMS_PORT_OLLAMA:-11444}:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - hems-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/11434' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --- PostgreSQL (optional, replaces SQLite) ---
  postgres:
    image: postgres:16-alpine
    container_name: hems-postgres
    restart: always
    profiles: ["postgres"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-hems}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required when using --profile postgres}
      - POSTGRES_DB=hems
    ports:
      - "127.0.0.1:${HEMS_PORT_POSTGRES:-5442}:5432"
    volumes:
      - hems_pg_data:/var/lib/postgresql/data
    networks:
      - hems-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hems} -d hems"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Perception (Camera-based person detection + activity tracking) ---
  perception:
    build: ../services/perception
    container_name: hems-perception
    restart: always
    profiles: ["perception"]
    ports:
      - "${HEMS_PORT_PERCEPTION:-8018}:8000"
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_USER=${MQTT_USER:-hems}
      - MQTT_PASS=${MQTT_PASS:-hems_dev_mqtt}
      - HEMS_PERCEPTION_CAMERAS=${HEMS_PERCEPTION_CAMERAS:-[]}
      - HEMS_PERCEPTION_MODEL=${HEMS_PERCEPTION_MODEL:-yolo11s.pt}
      - HEMS_PERCEPTION_POSE_MODEL=${HEMS_PERCEPTION_POSE_MODEL:-yolo11s-pose.pt}
      - HEMS_PERCEPTION_CONFIDENCE=${HEMS_PERCEPTION_CONFIDENCE:-0.5}
      - HEMS_PERCEPTION_INTERVAL=${HEMS_PERCEPTION_INTERVAL:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Asia/Tokyo}
    volumes:
      - ../services/perception/src:/app
      - hems_perception_models:/root/.cache
    networks:
      - hems-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  hems_mqtt_data:
  hems_mqtt_log:
  hems_backend_data:
  hems_brain_data:
  hems_audio_data:
  hems_pg_data:
  ollama_models:
  hems_perception_models:

networks:
  hems-net:
    driver: bridge
